# 开发环境 Docker Compose
# 仅容器化基础设施服务（PostgreSQL + Redis + MinIO），应用本地运行方便调试和热重载
# 使用方式：docker compose -f deploy/docker-compose.dev.yml --env-file .env.dev up -d

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-handcraft}
      POSTGRES_USER: ${DATABASE_USER:-handcraft}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-handcraft-dev}
    volumes:
      - handcraft-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-handcraft}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-handcraft-dev-redis}
    volumes:
      - handcraft-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-handcraft-dev-redis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-handcraft-dev}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-handcraft-dev-secret}
    volumes:
      - handcraft-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ACCESS_KEY:-handcraft-dev} ${MINIO_SECRET_KEY:-handcraft-dev-secret};
      mc mb --ignore-existing myminio/${MINIO_BUCKET:-handcraft};
      "
    restart: "no"

volumes:
  handcraft-pg-data:
    name: handcraft-pg-data
  handcraft-redis-data:
    name: handcraft-redis-data
  handcraft-minio-data:
    name: handcraft-minio-data
