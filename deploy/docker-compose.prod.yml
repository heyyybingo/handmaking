version: '3.8'

services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: handcraft-server-prod
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-oss}
      OSS_ENDPOINT: ${OSS_ENDPOINT}
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY}
      OSS_SECRET_KEY: ${OSS_SECRET_KEY}
      OSS_BUCKET: ${OSS_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      WX_APPID: ${WX_APPID}
      WX_SECRET: ${WX_SECRET}
    networks:
      - handcraft-prod

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: handcraft-web-prod
    restart: always
    networks:
      - handcraft-prod

  nginx:
    image: nginx:alpine
    container_name: handcraft-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - server
      - web
    networks:
      - handcraft-prod

networks:
  handcraft-prod:
    driver: bridge
