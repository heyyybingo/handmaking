version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: handcraft-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-handcraft}
      POSTGRES_USER: ${POSTGRES_USER:-handcraft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-handcraft}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - handcraft-staging

  redis:
    image: redis:7-alpine
    container_name: handcraft-redis-staging
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-staging-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - handcraft-staging

  minio:
    image: minio/minio:latest
    container_name: handcraft-minio-staging
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-staging-data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - handcraft-staging

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: handcraft-server-staging
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      DATABASE_URL: postgresql://${POSTGRES_USER:-handcraft}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-handcraft}
      REDIS_URL: redis://redis:6379
      STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-handcraft-staging}
      JWT_SECRET: ${JWT_SECRET}
      WX_APPID: ${WX_APPID}
      WX_SECRET: ${WX_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - handcraft-staging

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: handcraft-web-staging
    restart: unless-stopped
    networks:
      - handcraft-staging

  nginx:
    image: nginx:alpine
    container_name: handcraft-nginx-staging
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - server
      - web
    networks:
      - handcraft-staging

volumes:
  postgres-staging-data:
  redis-staging-data:
  minio-staging-data:

networks:
  handcraft-staging:
    driver: bridge
